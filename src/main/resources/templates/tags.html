<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp - Tags</title>
    <link rel="stylesheet" th:href="@{/retro.css}">
    <style>
        .tag-badge { display:inline-block; padding:2px 8px; font-size:13px; border:1px solid #808080; background:#e0e0e0; margin:2px; }
    </style>
</head>
<body>

<!-- Mac System 6 Menu Bar -->
<div class="mac-menubar">
    <span class="apple-logo">&#63743;</span>
    <span class="menu-item app-name">TodoApp</span>
    <a href="/" class="menu-item" style="text-decoration:none;color:inherit;">Lists</a>
    <a href="/tags" class="menu-item" style="text-decoration:none;color:inherit;background:#000;color:#fff;">Tags</a>
    <a href="/search" class="menu-item" style="text-decoration:none;color:inherit;">Search</a>
    <a href="/advanced" class="menu-item" style="text-decoration:none;color:inherit;">Advanced</a>
</div>

<!-- Desktop -->
<div class="desktop">
    <div class="win95-window">
        <!-- Title Bar -->
        <div class="win95-titlebar">
            <span class="title-text">Tags Manager</span>
            <div class="win95-titlebar-buttons">
                <button class="win95-titlebar-btn">_</button>
                <button class="win95-titlebar-btn">&#9633;</button>
                <button class="win95-titlebar-btn">X</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="win95-toolbar">
            <a th:href="@{/}" class="win95-btn" style="text-decoration:none; min-width:auto;">&#8592; Back</a>
            <form th:action="@{/tags}" method="post" style="display:flex; gap:4px; flex:1; align-items:center;">
                <input type="text" name="name" placeholder="New tag name..." class="win95-input" required>
                <button type="submit" class="win95-btn primary">Add Tag</button>
            </form>
        </div>

        <!-- Error display -->
        <div th:if="${errors != null}" style="padding:4px 8px; background:#ffcccc; border-bottom:1px solid #cc0000;">
            <span th:each="err : ${errors}" th:text="${err}" style="display:block; font-size:13px; color:#cc0000;"></span>
        </div>

        <!-- Info -->
        <div style="padding:4px 8px; background:#ffffcc; border-bottom:1px solid #808080; font-size:12px;">
            ORM features: changeset(), validateExclusion() (reserved names: admin, system, root, null), validateLength(1-50)
        </div>

        <!-- Body -->
        <div class="win95-body">
            <div class="win95-sunken" style="min-height:150px; max-height:300px;">
                <div th:if="${#lists.isEmpty(tags)}" style="padding:20px; text-align:center; color:#808080;">
                    No tags yet. Create one above!
                </div>

                <div th:each="tag : ${tags}" class="todo-item">
                    <span class="tag-badge" th:text="${tag.name}">tag</span>
                    <div class="todo-actions">
                        <form th:action="@{/tags/{id}/delete(id=${tag.id})}" method="post" style="display:inline;"
                              onsubmit="return confirm('Delete this tag?');">
                            <button type="submit" class="win95-btn danger" style="min-width:auto;">Del</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="win95-statusbar">
            <div class="status-section">
                <span th:text="${#lists.size(tags)} + ' tag(s)'">0 tag(s)</span>
            </div>
            <div class="status-section">
                Alloy ORM: validateExclusion, changeset
            </div>
        </div>
    </div>
</div>

</body>
</html>
